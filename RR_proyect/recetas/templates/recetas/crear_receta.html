{% extends 'recetas/base.html' %}

{% load crispy_forms_tags %}

{% block title %}Crear Receta{% endblock %}

{% block content %}
<div class="row">
    <div class="col-md-6 offset-md-3">
        <h1>Crear Nueva Receta</h1>
        
        <form method="post" class="mt-4">
            {% csrf_token %}
            {{ form|crispy }}
            <button type="submit" class="btn btn-success w-100">Crear Receta</button>
            <a href="{% url 'lista_recetas' %}" class="btn btn-secondary w-100 mt-2">Cancelar</a>
        </form>
    </div>
</div>
{% endblock %}
