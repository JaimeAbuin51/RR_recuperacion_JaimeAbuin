{% extends 'recetas/base.html' %}

{% block title %}Eliminar Receta{% endblock %}

{% block content %}
<div class="row">
    <div class="col-md-6 offset-md-3">
        <div class="alert alert-danger">
            <h2>⚠️ Eliminar Receta</h2>
            <p>¿Estás seguro de que quieres eliminar la receta <strong>{{ object.titulo }}</strong>?</p>
            <p class="text-muted small">Esta acción no se puede deshacer.</p>
        </div>

        <form method="post" class="mt-4">
            {% csrf_token %}
            <button type="submit" class="btn btn-danger w-100">Sí, eliminar</button>
            <a href="{% url 'detalle_receta' object.id %}" class="btn btn-secondary w-100 mt-2">Cancelar</a>
        </form>
    </div>
</div>
{% endblock %}
