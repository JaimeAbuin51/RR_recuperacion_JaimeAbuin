{% extends 'recetas/base.html' %}

{% load crispy_forms_tags %}

{% block title %}Iniciar Sesión{% endblock %}

{% block content %}
<div class="row">
    <div class="col-md-6 offset-md-3">
        <div class="card mt-5">
            <div class="card-body">
                <h2 class="card-title text-center mb-4">Iniciar Sesión</h2>
                
                <form method="post">
                    {% csrf_token %}
                    
                    <div class="mb-3">
                        <label for="{{ form.username.id_for_label }}" class="form-label">Usuario</label>
                        {{ form.username }}
                    </div>
                    
                    <div class="mb-3">
                        <label for="{{ form.password.id_for_label }}" class="form-label">Contraseña</label>
                        <div class="input-group">
                            {{ form.password }}
                            <button class="btn btn-outline-secondary" type="button" id="togglePassword">
                                Mostrar
                            </button>
                        </div>
                    </div>
                    
                    <button type="submit" class="btn btn-primary w-100">Iniciar Sesión</button>
                    <p class="text-center mt-3">¿No tienes cuenta? <a href="{% url 'registro' %}">Regístrate aquí</a></p>
                </form>
            </div>
        </div>
    </div>
</div>

<!-- Script de login-->
<script>
    document.getElementById('togglePassword').addEventListener('click', function() {
        var passwordField = document.querySelector('input[name="password"]');
        var button = this;
        
        if (passwordField.type === 'password') {
            passwordField.type = 'text';
            button.innerHTML = 'Ocultar';
        } else {
            passwordField.type = 'password';
            button.innerHTML = 'Mostrar';
        }
    });
</script>

{% endblock %}
